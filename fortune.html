<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>星座运势 | 生辰八卦 | 易经数字卦 | 仅供娱乐</title>
    <link rel="stylesheet" href="css/fortune.css">
</head>
<body>
<div class="container">
    <div class="back-btn">
        <a href="index.html">← 返回首页</a>
    </div>
    <div class="header">
        <h1>✨ 星座 | 八卦 | 数字卦 ✨</h1>
        <p class="fortune-tip">每天只看第一次刷到的预测结果，或是你第一次注意到的预测结果。</p>
        <div class="date-box" id="currentDate"></div>
    </div>

    <!-- Tab 栏 -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="daily">每日运势</button>
        <button class="tab-btn" data-tab="bazi">八字排盘</button>
        <button class="tab-btn" data-tab="yijing">易经起卦</button>
    </div>

    <!-- 每日运势面板 -->
    <div id="dailyPane" class="tab-pane active">
        <div class="zodiac-selector" id="zodiacButtons"></div>
        <div class="fortune-card">
            <div class="zodiac-name">
                <span id="zodiacSymbol">♈</span>
                <span id="zodiacName">白羊座</span>
            </div>
            <div class="stars-rating" id="starRating">★★★★★</div>
            <div class="luck-score" id="luckScore">✨ 综合运势：92分</div>
            <div class="prediction-text" id="predictionText">今天活力满满...</div>
            <div class="detail-list">
                <div class="detail-item"><div class="detail-label">💖 爱情运</div><div class="detail-value" id="loveLuck">★★★★☆</div></div>
                <div class="detail-item"><div class="detail-label">📈 事业运</div><div class="detail-value" id="careerLuck">★★★★☆</div></div>
                <div class="detail-item"><div class="detail-label">💰 财富运</div><div class="detail-value" id="wealthLuck">★★★☆☆</div></div>
                <div class="detail-item"><div class="detail-label">🍀 幸运色</div><div class="detail-value" id="luckyColor">金色</div></div>
                <div class="detail-item"><div class="detail-label">🔢 幸运数字</div><div class="detail-value" id="luckyNumber">7</div></div>
            </div>
            <button class="refresh-btn" id="refreshBtn">🔄 刷新今日运势</button>
        </div>
    </div>

    <!-- 八字排盘面板 -->
    <div id="baziPane" class="tab-pane">
        <div class="bazi-form">
            <div class="inline-group">
                <div class="field">
                    <label>📅 出生日期</label>
                    <input type="date" id="birthDate" value="1990-05-15">
                </div>
                <div class="field">
                    <label>⏰ 时辰 (0-23)</label>
                    <input type="number" id="birthHour" min="0" max="23" step="1" value="10">
                </div>
                <div class="field">
                    <label>⚥ 性别</label>
                    <select id="gender">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <button id="baziCalcBtn">✨ 排盘</button>
                <button id="clearMemoryBtn" class="small">🗑️ 清除记忆</button>
            </div>
        </div>
        <div id="baziResult" class="result-card">
            <p style="text-align:center; color:#b97f4b;">✨ 输入生日后点击排盘，我们会记住您的信息 ✨</p>
        </div>
        <div class="bazi-form" style="margin-top: 10px;">
            <div class="inline-group">
                <div class="field">
                    <label>📅 流年预测年份</label>
                    <input type="number" id="forecastYear" value="2026">
                </div>
                <button id="forecastBtn">🌟 预测流年运势</button>
            </div>
        </div>
        <div id="forecastResult" class="result-card"></div>
    </div>

    <!-- 易经起卦面板（仅数字卦） -->
    <div id="yijingPane" class="tab-pane">
        <div class="yijing-form">
            <div class="field">
                <label>📝 心中所想（选填）</label>
                <input type="text" id="questionInput" placeholder="例如：事业发展">
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-top: 15px;">
                <div style="display: flex; gap: 8px; align-items: flex-end;">
                    <div class="field" style="min-width: 70px;">
                        <label>数字1</label>
                        <input type="number" id="num1" value="3" style="width:80px">
                    </div>
                    <div class="field" style="min-width: 70px;">
                        <label>数字2</label>
                        <input type="number" id="num2" value="6" style="width:80px">
                    </div>
                    <div class="field" style="min-width: 70px;">
                        <label>数字3</label>
                        <input type="number" id="num3" value="9" style="width:80px">
                    </div>
                    <button id="numberGuaBtn">🔢 起卦</button>
                </div>
            </div>
        </div>
        <div id="yijingResult" class="result-card"></div>
    </div>

    <div class="footer">
        <p>✨ 传统文化研究 · 仅供娱乐 · Cookie会记住您的生日 ✨</p>
    </div>
</div>

<script src="js/fortune.js"></script>
</body>
</html>
