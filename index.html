<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小而简工具</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tiny Small Toolkits</h1>
            <p class="subtitle">小简不凡，来源生活的一些需要，汇聚这片高效</p>

            <div class="features">
                <div class="feature-intro">
                    <div class="feature-intro-text">
                        <span>⚡ 欢迎！这里是汇集一些小工具的网站，功能简单但比较专一，可收藏网页，便于后续使用</span>
                        <span>可点击 打开工具 使用对应的小工具，每个小工具是一个独立的页面，包含工具的进一步说明</span>
                        <span>现在的工具集包括每日运势、计算器、颜色选择器、密码生成器</span>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div class="tools-grid">
                <a href="fortune.html" class="tool-card">
                    <h3 class="tool-title">每日运势</h3>
                    <p class="tool-description">简单的运势预测小工具，娱乐至上</p>
                    <span class="tool-link">打开工具</span>
                </a>

                <a href="cal.html" class="tool-card">
                    <h3 class="tool-title">计算器</h3>
                    <p class="tool-description">支持基本算术运算、括号和复杂表达式计算</p>
                    <span class="tool-link">打开工具</span>
                </a>

                <a href="color-picker.html" class="tool-card">
                    <h3 class="tool-title">颜色选择器</h3>
                    <p class="tool-description">可视化选择颜色，获取HEX、RGB、HSL值</p>
                    <span class="tool-link">打开工具</span>
                </a>

                <a href="pwd_gen.html" class="tool-card">
                    <h3 class="tool-title">密码生成器</h3>
                    <p class="tool-description">生成随机密码，多种格式选择</p>
                    <span class="tool-link">打开工具</span>
                </a>
            </div>
        </main>

        <footer>
            <p>© 2026 简而小工具集</p>
        </footer>
    </div>
</body>
</html>
